name: Generate Android Icons

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Install Capacitor assets
        run: npm install -D @capacitor/assets

      - name: Generate Android assets
        run: npx @capacitor/assets generate --android

      - name: Upload generated mipmap assets
        uses: actions/upload-artifact@v4
        with:
          name: android-icons
          path: |
            android/app/src/main/res/mipmap-*
            android/app/src/main/res/drawable*
